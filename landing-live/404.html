<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sayfa Bulunamadı | Kavira Software</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Crect width='80' height='80' rx='18' fill='%23FFD84A'/%3E%3Cpath d='M22 18 L32 18 L32 62 L22 62 Z' fill='%23080909'/%3E%3Cpath d='M32 40 L52 18 L58 24 L42 40 Z' fill='%23080909'/%3E%3Cpath d='M32 40 L42 50 L36 56 L32 52 Z' fill='%23080909'/%3E%3Cpath d='M44 52 L58 62 L52 62 L38 54 Z' fill='%23080909'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#080909;color:#fafafa;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.6;-webkit-font-smoothing:antialiased}
.box{max-width:540px;text-align:center}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:#FFD84A;letter-spacing:2px;margin-bottom:18px}
.tag::before{content:'// '}
.code{font-size:140px;font-weight:900;background:linear-gradient(135deg,#FFD84A,#FF9D4A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:12px;letter-spacing:-6px}
h1{font-size:32px;font-weight:800;margin-bottom:14px;letter-spacing:-1px}
p{color:#a0a4ab;margin-bottom:34px;font-size:15px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-block;padding:13px 24px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;transition:transform .15s, box-shadow .25s}
a:hover{transform:translateY(-2px)}
.primary{background:#FFD84A;color:#080909}
.primary:hover{box-shadow:0 12px 28px rgba(255,216,74,.35)}
.secondary{background:rgba(255,255,255,.05);color:#fafafa;border:1px solid #2d3138}
.secondary:hover{background:rgba(255,255,255,.08)}
</style>
</head>
<body>
<div class="box">
  <span class="tag">404</span>
  <div class="code">404</div>
  <h1>Sayfa bulunamadı</h1>
  <p>Aradığınız sayfa taşınmış, silinmiş veya henüz var olmamış olabilir.</p>
  <div class="btns">
    <a href="/" class="primary">Ana Sayfa</a>
    <a href="/#sektorler" class="secondary">Sektörler</a>
  </div>
</div>
</body>
</html>
